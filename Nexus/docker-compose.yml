# Nexus — Phase 1: Postgres + NGINX (Ollama proxy) + App placeholder
# Usage:
#   docker compose up -d postgres nginx
#   docker compose --profile app up -d   # when Dockerfile + app are ready (Phase 2)

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports:
      - "5432:5432"
    volumes:
      - nexus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: nexus-nginx-ollama
    restart: unless-stopped
    ports:
      # Exposed Ollama proxy (Basic Auth). Point Nexus OLLAMA_URL at http://user:pass@host:11435
      - "11435:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: []

  app:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexus
      NODE_ENV: production
      # OLLAMA_URL: http://ollama-user:ollama-pass@nginx:80  # internal: use service name + port 80 inside compose network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  nexus_pgdata:
