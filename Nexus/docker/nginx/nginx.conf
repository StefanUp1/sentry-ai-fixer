# Nexus — proxy Ollama with Basic Auth. Upstream = host Ollama (default port 11434).
# Replace host.docker.internal with your Ollama host if needed.

worker_processes auto;
events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  # Increase if large model payloads
  client_max_body_size 256m;
  proxy_read_timeout   600s;
  proxy_send_timeout   600s;

  server {
    listen 80;
    server_name _;

    auth_basic           "Ollama";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Ollama on the Docker host (Mac/Windows Docker Desktop)
      proxy_pass http://host.docker.internal:11434;
    }
  }
}
